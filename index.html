<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diaspore aerodynamic efficiency</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #2c2c2a;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 1.25rem 1.5rem 1rem;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 0.75rem;
    flex-shrink: 0;
  }
  .title-block h1 { font-size: 1.15rem; font-weight: 500; }
  .title-block p  { font-size: 0.8rem; color: #5f5e5a; margin-top: 2px; }

  .right-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .toggle-group { display: flex; gap: 6px; }
  .toggle-btn {
    padding: 7px 22px; font-size: 13px;
    border: 1.5px solid #bbb; border-radius: 20px;
    background: white; color: #5f5e5a;
    cursor: pointer; font-weight: 400; transition: all 0.15s;
  }
  .toggle-btn:hover { border-color: #888; color: #2c2c2a; }
  .toggle-btn.active-nat  { background: #185FA5; border-color: #185FA5; color: white; font-weight: 500; }
  .toggle-btn.active-prot { background: #993C1D; border-color: #993C1D; color: white; font-weight: 500; }

  .refresh-btn {
    padding: 6px 14px; font-size: 12px;
    border: 1px solid #bbb; border-radius: 6px;
    background: white; color: #5f5e5a;
    cursor: pointer;
  }
  .refresh-btn:hover { background: #f0eeea; color: #2c2c2a; }

  #status { font-size: 11px; color: #888780; flex-shrink: 0; margin-bottom: 0.4rem; min-height: 16px; }
  #status.error { color: #a32d2d; }

  .chart-wrapper {
    flex: 1; background: white; border-radius: 10px;
    border: 1px solid #e0dfd9; padding: 1rem 1.25rem 0.75rem;
    display: flex; flex-direction: column; min-height: 0;
  }
  .chart-inner { flex: 1; position: relative; min-height: 0; }

  #legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 0.6rem; font-size: 11px; color: #5f5e5a;
    padding-top: 0.6rem; border-top: 1px solid #e8e7e2; flex-shrink: 0;
  }
  .legend-break   { flex-basis: 100%; height: 0; }
  .legend-item    { display: flex; align-items: center; gap: 4px; }
  .legend-line    { display: inline-block; width: 20px; height: 2px; flex-shrink: 0; }
  .legend-dot     { display: inline-block; width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-diamond { display: inline-block; width: 8px; height: 8px; transform: rotate(45deg); flex-shrink: 0; }
</style>
</head>
<body>

<div class="topbar">
  <div class="title-block">
    <h1>Aerodynamic efficiency of flying diaspores</h1>
    <p>Descent time vs wing loading — coloured lines show constant descent factor (DF)</p>
  </div>
  <div class="right-controls">
    <div class="toggle-group">
      <button class="toggle-btn active-nat" id="btn-nat"  onclick="showView('natural')">Natural diaspores</button>
      <button class="toggle-btn"            id="btn-prot" onclick="showView('prototype')">Paper prototypes</button>
    </div>
    <button class="refresh-btn" onclick="loadAll()">Refresh ↻</button>
  </div>
</div>

<div id="status">Loading…</div>

<div class="chart-wrapper">
  <div class="chart-inner"><canvas id="mainChart"></canvas></div>
  <div id="legend"></div>
</div>

<script>
/* ============================================================
   SHEET URLS — replace with your published CSV links
   In Google Sheets: File → Share → Publish to web →
   select the sheet tab → CSV → Publish → copy link
   ============================================================ */
const URL_NATURAL   = 'YOUR_NATURAL_SHEET_CSV_URL_HERE';
const URL_PROTOTYPE = 'YOUR_PROTOTYPE_SHEET_CSV_URL_HERE';
/* ============================================================ */

const DF_LINES = [
  { df: 0.5,  color: '#9FE1CB', label: 'DF = 0.5' },
  { df: 1.0,  color: '#5DCAA5', label: 'DF = 1'   },
  { df: 2.0,  color: '#378ADD', label: 'DF = 2'   },
  { df: 3.0,  color: '#7F77DD', label: 'DF = 3'   },
  { df: 5.0,  color: '#EF9F27', label: 'DF = 5'   },
  { df: 10.0, color: '#D85A30', label: 'DF = 10'  },
];
const COLORS_NAT   = ['#185FA5','#0F6E56','#3C3489','#085041','#0C447C','#1a6e3c','#263489'];
const COLORS_PAPER = ['#993C1D','#854F0B','#7a2040','#633806','#711B0C','#72243E','#4a1f02'];

let chart = null;
let naturalData = [], protoData = [];
let currentView = 'natural';

function tFromDF(ws, df) { return Math.sqrt(0.61 * df / ws); }

function generateDFLine(df) {
  const pts = [];
  for (let ws = 0.02; ws <= 8.5; ws += 0.04)
    pts.push({ x: +ws.toFixed(3), y: +tFromDF(ws, df).toFixed(4) });
  return pts;
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
}

function parseRows(text) {
  const raw = text.trim().replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  return raw.split('\n').map(row => {
    const cols = []; let cur = '', inQ = false;
    for (const ch of row) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    return cols;
  });
}

function findCol(hdr, ...keys) {
  for (const key of keys) {
    const i = hdr.findIndex(h => h === key || h.startsWith(key));
    if (i >= 0) return i;
  }
  return -1;
}

function parseNatural(text) {
  const rows = parseRows(text);
  if (rows.length < 2) return [];
  const hdr = rows[0].map(h => h.toLowerCase().replace(/[^a-z0-9]/g,''));
  const nameI = findCol(hdr, 'name');
  const wI    = findCol(hdr, 'wmn', 'w');
  const sI    = findCol(hdr, 's');
  const tI    = findCol(hdr, 't');
  if ([nameI,wI,sI,tI].some(i => i < 0)) return [];
  return rows.slice(1)
    .filter(r => r[nameI] && r[nameI].trim())
    .map(r => {
      const W  = parseFloat(r[wI]) / 1000;  // mN → N
      const Scm2 = parseFloat(r[sI]);
      const S  = Scm2 / 10000;              // cm² → m²
      const T  = parseFloat(r[tI]);
      const ws = W / S;
      const df = (T * T * ws) / 0.61;
      return { name: r[nameI].trim(), W, S, T, ws, df };
    })
    .filter(s => isFinite(s.ws) && s.ws > 0 && isFinite(s.T) && s.T > 0);
}

function parsePrototype(text) {
  const rows = parseRows(text);
  if (rows.length < 2) return [];
  const hdr = rows[0].map(h => h.toLowerCase().replace(/[^a-z0-9]/g,''));
  // "name prototype" column → used as hover title
  // "name" column          → individual student names (shown in legend subtitle)
  const protoNameI  = findCol(hdr, 'nameprototype', 'protoname', 'prototype');
  const studentNameI = findCol(hdr, 'name');
  const wI  = findCol(hdr, 'wmn', 'w');
  const sI  = findCol(hdr, 's');
  const tI  = findCol(hdr, 't');
  if ([wI,sI,tI].some(i => i < 0)) return [];
  // If no separate prototype name column, fall back to student name
  const titleI = protoNameI >= 0 ? protoNameI : studentNameI;
  return rows.slice(1)
    .filter(r => r[titleI] && r[titleI].trim())
    .map(r => {
      const W    = parseFloat(r[wI]) / 1000;  // mN → N
      const Scm2 = parseFloat(r[sI]);
      const S    = Scm2 / 10000;              // cm² → m²
      const T    = parseFloat(r[tI]);
      const ws   = W / S;
      const df   = (T * T * ws) / 0.61;
      const students = studentNameI >= 0 && studentNameI !== titleI ? r[studentNameI].trim() : '';
      return { name: r[titleI].trim(), students, W, S, T, ws, df };
    })
    .filter(s => isFinite(s.ws) && s.ws > 0 && isFinite(s.T) && s.T > 0);
}

async function fetchCSV(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return await resp.text();
}

async function loadAll() {
  setStatus('Loading…');
  try {
    const [natText, protText] = await Promise.all([
      fetchCSV(URL_NATURAL),
      fetchCSV(URL_PROTOTYPE),
    ]);
    naturalData = parseNatural(natText);
    protoData   = parsePrototype(protText);
    showView(currentView);
    setStatus(
      naturalData.length + ' natural diaspore' + (naturalData.length !== 1 ? 's' : '') +
      ', ' + protoData.length + ' prototype' + (protoData.length !== 1 ? 's' : '') + ' loaded.'
    );
  } catch(e) {
    setStatus('Could not load data: ' + e.message, true);
  }
}

function showView(view) {
  currentView = view;
  document.getElementById('btn-nat').className  = 'toggle-btn' + (view === 'natural'   ? ' active-nat'  : '');
  document.getElementById('btn-prot').className = 'toggle-btn' + (view === 'prototype' ? ' active-prot' : '');
  buildChart(view === 'natural' ? naturalData : protoData, view);
}

function buildChart(students, view) {
  if (chart) chart.destroy();
  const colors = view === 'natural' ? COLORS_NAT : COLORS_PAPER;
  const isNat  = view === 'natural';

  const dfDatasets = DF_LINES.map(line => ({
    label: line.label, data: generateDFLine(line.df),
    type: 'line', borderColor: line.color, borderWidth: 1.5,
    pointRadius: 0, fill: false, tension: 0.3,
    order: 2, parsing: false, _isDFLine: true,
  }));

  const studentDatasets = students.map((s, i) => {
    const col = colors[i % colors.length];
    return {
      label: s.name,
      data: [{ x: s.ws, y: s.T }],
      type: 'scatter',
      backgroundColor: col + 'bb', borderColor: col, borderWidth: 1.5,
      pointRadius: 10, pointHoverRadius: 14,
      pointStyle: isNat ? 'circle' : 'rectRot',
      order: 1,
      _df: s.df, _W: s.W, _S: s.S,
      _name: s.name,
      _students: s.students || '',
    };
  });

  chart = new Chart(document.getElementById('mainChart'), {
    type: 'scatter',
    data: { datasets: [...dfDatasets, ...studentDatasets] },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 8, right: 30, bottom: 4, left: 8 } },
      scales: {
        x: {
          type: 'linear', min: 0, max: 7,
          title: { display: true, text: 'Wing loading  W/S  [N m⁻²]', font: { size: 12 }, color: '#5f5e5a' },
          ticks: { font: { size: 11 }, color: '#5f5e5a' },
          grid: { color: 'rgba(0,0,0,0.06)' },
        },
        y: {
          type: 'linear', min: 0, max: 3.5,
          title: { display: true, text: 'Descent time  T  [s m⁻¹]', font: { size: 12 }, color: '#5f5e5a' },
          ticks: { font: { size: 11 }, color: '#5f5e5a' },
          grid: { color: 'rgba(0,0,0,0.06)' },
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          filter: item => !item.dataset._isDFLine,
          callbacks: {
            title: ctx => ctx[0].dataset._name,
            label: ctx => {
              const ds = ctx.dataset, pt = ctx.raw;
              const lines = [];
              if (ds._students) lines.push(ds._students);
              lines.push(
                'W/S = ' + pt.x.toFixed(3) + ' N m⁻²',
                'T = '   + pt.y.toFixed(3) + ' s m⁻¹',
                'DF = '  + ds._df.toFixed(2),
              );
              return lines;
            }
          },
          backgroundColor: 'rgba(255,255,255,0.97)',
          titleColor: '#2C2C2A', bodyColor: '#5F5E5A',
          borderColor: 'rgba(0,0,0,0.15)', borderWidth: 1,
          padding: 12, displayColors: false,
          titleFont: { size: 14, weight: '500' }, bodyFont: { size: 12 },
        }
      }
    }
  });

  buildLegend(students, view);
}

function buildLegend(students, view) {
  const colors = view === 'natural' ? COLORS_NAT : COLORS_PAPER;
  const isNat  = view === 'natural';
  let html = DF_LINES.map(l =>
    `<span class="legend-item"><span class="legend-line" style="background:${l.color}"></span>${l.label}</span>`
  ).join('');
  if (students.length) {
    html += `<span class="legend-break"></span>`;
    students.forEach((s, i) => {
      const col  = colors[i % colors.length];
      const dot  = isNat
        ? `<span class="legend-dot" style="background:${col}"></span>`
        : `<span class="legend-diamond" style="background:${col}"></span>`;
      const sub  = s.students ? ` <span style="color:#bbb;">(${s.students})</span>` : '';
      html += `<span class="legend-item">${dot}${s.name}${sub} <span style="color:#bbb;margin-left:2px;">(DF ${s.df.toFixed(2)})</span></span>`;
    });
  }
  document.getElementById('legend').innerHTML = html;
}

loadAll();
</script>
</body>
</html>
